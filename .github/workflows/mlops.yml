name: MLOps Training Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run training script and log to DagsHub
      env:
        MLFLOW_TRACKING_URI: "https://dagshub.com/lewko98/mlops-quickstart.mlflow"
        MLFLOW_TRACKING_USERNAME: "lewko98"
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
      run: |
        python train.py